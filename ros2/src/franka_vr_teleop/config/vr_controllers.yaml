controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    franka_robot_state_broadcaster:
      type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

    cartesian_pose_example_controller:
      type: franka_example_controllers/CartesianPoseExampleController

cartesian_pose_example_controller:
  ros__parameters:
    arm_id: fr3
    k_gains:
      - 10.0  # X stiffness (molasses)
      - 10.0  # Y stiffness
      - 10.0  # Z stiffness
      - 2.0   # Roll stiffness
      - 2.0   # Pitch stiffness
      - 2.0   # Yaw stiffness
      - 1.0   # Nullspace stiffness
    d_gains:
      - 50.0  # X damping (highly damped)
      - 50.0  # Y damping
      - 50.0  # Z damping
      - 10.0  # Roll damping
      - 10.0  # Pitch damping
      - 10.0  # Yaw damping
      - 2.0   # Nullspace damping
